# =============================================================================
# Hermes Agent — Three-Agent Deployment
# Agents: Warren (CFO) + Stacks (Personal Assistant) + Medicus (Medical Agent)
# Host:   Hostinger VPS / Ubuntu 24.04
# Usage:  docker compose up -d
# Logs:   docker compose logs -f warren
#         docker compose logs -f stacks
#         docker compose logs -f medicus
# Update: docker compose pull && docker compose up -d
# =============================================================================

services:

  warren:
    image: nousresearch/hermes-agent:latest
    container_name: warren
    restart: unless-stopped
    command: gateway run
    hostname: warren

    volumes:
      - /home/hermes/hermes/warren:/opt/data

    env_file:
      - /home/hermes/hermes/warren/.env

    shm_size: "1gb"
    cpus: "1.0"
    mem_limit: "2500m"
    mem_reservation: "512m"

    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"

    healthcheck:
      test: ["CMD", "hermes", "doctor", "--quiet"]
      interval: 60s
      timeout: 15s
      retries: 3
      start_period: 30s

    networks:
      - hermes-net

  stacks:
    image: nousresearch/hermes-agent:latest
    container_name: stacks
    restart: unless-stopped
    command: gateway run
    hostname: stacks

    volumes:
      - /home/hermes/hermes/stacks:/opt/data

    env_file:
      - /home/hermes/hermes/stacks/.env

    shm_size: "512mb"
    cpus: "0.6"
    mem_limit: "1750m"
    mem_reservation: "256m"

    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"

    healthcheck:
      test: ["CMD", "hermes", "doctor", "--quiet"]
      interval: 60s
      timeout: 15s
      retries: 3
      start_period: 30s

    networks:
      - hermes-net

  medicus:
    image: nousresearch/hermes-agent:latest
    container_name: medicus
    restart: unless-stopped
    command: gateway run
    hostname: medicus

    volumes:
      - /home/hermes/hermes/medicus:/opt/data

    env_file:
      - /home/hermes/hermes/medicus/.env

    shm_size: "1gb"
    cpus: "0.8"
    mem_limit: "2250m"
    mem_reservation: "512m"

    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"

    healthcheck:
      test: ["CMD", "hermes", "doctor", "--quiet"]
      interval: 60s
      timeout: 15s
      retries: 3
      start_period: 30s

    networks:
      - hermes-net

networks:
  hermes-net:
    driver: bridge
